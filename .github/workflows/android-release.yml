name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build, for example v0.1.15'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vX.Y.Z; received '${release_tag}'."
            exit 1
          fi

          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "RELEASE_VERSION=${release_tag#v}" >> "${GITHUB_ENV}"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Validate Android signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required GitHub secret: ${secret_name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Configure Android release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/release.keystore

          {
            echo 'storeFile=release.keystore'
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
          } > android/keystore.properties

      - name: Build signed Android release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -PskipAndroidVersionBump=true

      - name: Ensure CI did not modify version source
        run: git diff --exit-code -- version.config.json

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release

          if [ -f RELEASE_NOTES.md ]; then
            cp RELEASE_NOTES.md dist-release/release-notes.md
          else
            printf 'Android release %s\n' "${RELEASE_TAG}" > dist-release/release-notes.md
          fi

      - name: Generate Android release metadata
        env:
          APK_PATH: android/app/build/outputs/apk/release/app-release.apk
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_NOTES_PATH: dist-release/release-notes.md
          OUTPUT_DIR: dist-release
        run: npm run generate:android-release-metadata

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist-release/TaiChinhCaNhan-${{ env.RELEASE_TAG }}.apk
            dist-release/latest.json

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_title="TaiChinhCaNhan ${RELEASE_TAG}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${release_title}" \
              --notes-file dist-release/release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --title "${release_title}" \
              --notes-file dist-release/release-notes.md
          fi

      - name: Upload GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release upload "${RELEASE_TAG}" \
            "dist-release/TaiChinhCaNhan-${RELEASE_TAG}.apk" \
            dist-release/latest.json \
            --clobber
