# =============================================================
# build-bundle.yml
# CI/CD: Tự động build OTA bundle sau mỗi push vào main
#
# Secret cần cấu hình duy nhất:
#   BUNDLE_SIGNING_KEY — Nội dung private_key.pem (RSA 4096-bit)
#                       Settings → Secrets and variables → Actions
#
# Artifacts được publish lên GitHub Releases với tag:
#   bundle-<bundleVersion>  (VD: bundle-0.1.0-b1)
# Public download URL (dùng trong bundle-manifest.json):
#   https://github.com/<owner>/<repo>/releases/download/bundle-<ver>/<ver>.zip
# =============================================================
name: Build OTA Bundle

on:
  push:
    branches:
      - main
  # Chạy thủ công từ GitHub UI nếu cần
  workflow_dispatch:

# Chỉ cho phép 1 workflow chạy cùng lúc trên main
# Workflow cũ hơn sẽ bị hủy thay vì chờ
concurrency:
  group: build-bundle-${{ github.ref }}
  cancel-in-progress: true

# Cấp quyền tối thiểu cho GITHUB_TOKEN
# contents: write — cần để tạo Release, upload artifact và push manifest
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build → Sign → GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUNDLE_VERSION: ""
      CHECKSUM: ""

    steps:
      # ----------------------------------------------------------
      # Step 1: Checkout code
      # ----------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Step 2: Setup Node.js 20 với npm cache
      # ----------------------------------------------------------
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ----------------------------------------------------------
      # Step 3: Cài đặt dependencies
      # ----------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ----------------------------------------------------------
      # Step 4: Ghi BUNDLE_SIGNING_KEY ra private_key.pem
      # Dùng printf để tránh platform-specific newline issues với PEM
      # ----------------------------------------------------------
      - name: Write signing key
        env:
          BUNDLE_SIGNING_KEY: ${{ secrets.BUNDLE_SIGNING_KEY }}
        run: |
          printf '%s' "${BUNDLE_SIGNING_KEY}" > private_key.pem
          chmod 600 private_key.pem

      # ----------------------------------------------------------
      # Step 5: Build bundle (vite build → zip → sha256 → sign)
      # ----------------------------------------------------------
      - name: Build OTA bundle
        run: bash scripts/build-bundle.sh

      # ----------------------------------------------------------
      # Step 6: Đọc bundleVersion → $GITHUB_ENV
      # Dùng node -p với fs.readFileSync thay vì require()
      # vì package.json có "type":"module" (ESM)
      # ----------------------------------------------------------
      - name: Read bundle version
        run: |
          BUNDLE_VERSION=$(node -e "
            import fs from 'fs';
            const v = JSON.parse(fs.readFileSync('./version.config.json', 'utf8'));
            process.stdout.write(v.bundleVersion);
          " --input-type=module)
          echo "BUNDLE_VERSION=${BUNDLE_VERSION}" >> "$GITHUB_ENV"
          echo ">> bundleVersion = ${BUNDLE_VERSION}"

      # ----------------------------------------------------------
      # Step 7: Upload artifacts lên GitHub Actions Artifacts
      # Dùng để debug; giữ 7 ngày
      # ----------------------------------------------------------
      - name: Upload artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: ota-bundle-${{ github.sha }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

      # ----------------------------------------------------------
      # Step 8: Tạo GitHub Release và đính kèm 3 artifacts
      #
      # Tag format  : bundle-<bundleVersion> (VD: bundle-0.1.0-b1)
      # Nếu tag đã tồn tại (push lại cùng version) — release sẽ được
      # cập nhật (update_existing_release: true)
      #
      # Download URL sau khi release:
      #   https://github.com/huyphamngoc98nb/TaiXiuCaNhan/releases/download
      #   /bundle-<ver>/<ver>.zip
      # ----------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bundle-${{ env.BUNDLE_VERSION }}
          name: "OTA Bundle ${{ env.BUNDLE_VERSION }}"
          body: |
            ## OTA Bundle `${{ env.BUNDLE_VERSION }}`
            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref_name }}
            **Build time**: ${{ github.event.head_commit.timestamp }}
            ### Artifacts
            | File | Mô tả |
            |------|-------|
            | `${{ env.BUNDLE_VERSION }}.zip` | Web bundle (giải nén vào app) |
            | `${{ env.BUNDLE_VERSION }}.zip.sha256` | SHA-256 checksum |
            | `${{ env.BUNDLE_VERSION }}.zip.sig` | Chữ ký RSA-SHA256 |
            ### Verify chữ ký
            ```bash
            openssl dgst -sha256 -verify public_key.pem \
              -signature ${{ env.BUNDLE_VERSION }}.zip.sig \
              ${{ env.BUNDLE_VERSION }}.zip
            ```
          files: |
            artifacts/${{ env.BUNDLE_VERSION }}.zip
            artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256
            artifacts/${{ env.BUNDLE_VERSION }}.zip.sig
          make_latest: true
          fail_on_unmatched_files: true

      # ----------------------------------------------------------
      # Step 9: In public URL để dễ copy vào bundle-manifest.json
      # ----------------------------------------------------------
      - name: Print download URLs
        run: |
          BASE="https://github.com/huyphamngoc98nb/TaiXiuCaNhan/releases/download/bundle-${{ env.BUNDLE_VERSION }}"
          echo ""
          echo "============================================================"
          echo " RELEASE URLs (dùng trong bundle-manifest.json)"
          echo "============================================================"
          echo "  url    : ${BASE}/${{ env.BUNDLE_VERSION }}.zip"
          echo "  sigUrl : ${BASE}/${{ env.BUNDLE_VERSION }}.zip.sig"
          echo "  sha256 : $(cat artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256)"
          echo "============================================================"

      # ----------------------------------------------------------
      # Step A: Đọc checksum vào $GITHUB_ENV
      # BUNDLE_VERSION đã có sẵn từ Step 6, chỉ cần set thêm CHECKSUM
      # ----------------------------------------------------------
      - name: Read checksum into env
        run: |
          CHECKSUM=$(cat "artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256")
          echo "CHECKSUM=${CHECKSUM}" >> "$GITHUB_ENV"
          echo ">> checksum = ${CHECKSUM}"

      # ----------------------------------------------------------
      # Step B: Chạy update-manifest.js cập nhật bundle-manifest.json
      # CDN_BASE_URL = GitHub Releases base download URL của repo
      # Format: .../releases/download/bundle-<ver> (update-manifest.js
      # sẽ tự nối thêm /<ver>.zip)
      # ----------------------------------------------------------
      - name: Update bundle manifest
        env:
          CDN_BASE_URL: "https://github.com/huyphamngoc98nb/TaiXiuCaNhan/releases/download/bundle-${{ env.BUNDLE_VERSION }}"
        run: |
          node scripts/update-manifest.js \
            --version "${{ env.BUNDLE_VERSION }}" \
            --checksum "${{ env.CHECKSUM }}"

      # ----------------------------------------------------------
      # Step C: Git commit và push bundle-manifest.json
      # Dùng GITHUB_TOKEN mặc định (permissions: contents: write đã khai báo)
      # Guard: chỉ commit nếu có thay đổi thực sự — tránh lỗi commit rỗng
      # ----------------------------------------------------------
      - name: Commit and push bundle manifest
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add server/data/bundle-manifest.json
          if git diff --cached --quiet; then
            echo ">> bundle-manifest.json không thay đổi, bỏ qua commit."
          else
            git commit -m "ci: update bundle manifest to ${{ env.BUNDLE_VERSION }}"
            git push
            echo ">> Đã push bundle-manifest.json lên main."
          fi

      # ----------------------------------------------------------
      # Step 10: Xóa private key — luôn chạy kể cả khi fail
      # ----------------------------------------------------------
      - name: Cleanup signing key
        if: always()
        run: |
          rm -f private_key.pem
          echo ">> private_key.pem đã được xóa"

  # ============================================================
  # Job Android: Build + Unit test dưới JDK 17
  # Chạy song song với build-and-release, không phụ thuộc nhau
  # Gradle 8.10.2 (wrapper hiện tại) tương thích JDK 17 ✅
  # build.gradle đã khai báo JavaVersion.VERSION_17 ✅
  # ============================================================
  android-build:
    name: Android → JDK 17 → Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ----------------------------------------------------------
      # Step 1: Checkout
      # ----------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Step 2: Setup JDK 17 (Temurin — OpenJDK phổ biến nhất cho Android CI)
      # Đây là bước bắt buộc:
      # Android Gradle Plugin yêu cầu Java 17 để chạy.
      # ----------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ----------------------------------------------------------
      # Step 3: Setup Node.js 20 — cần để vite build (capacitor sync)
      # và để đọc version.config.json trong build.gradle
      # ----------------------------------------------------------
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ----------------------------------------------------------
      # Step 4: Cài npm dependencies
      # ----------------------------------------------------------
      - name: Install npm dependencies
        run: npm ci

      # ----------------------------------------------------------
      # Step 5: Verify Java và Gradle đúng version
      # ----------------------------------------------------------
      - name: Verify Java & Gradle versions
        run: |
          echo "=== Java version ==="
          java -version
          echo ""
          echo "=== Gradle version ==="
          cd android
          ./gradlew -version

      # ----------------------------------------------------------
      # Step 6: Cấp quyền thực thi cho gradlew (cần thiết trên Linux)
      # ----------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ----------------------------------------------------------
      # Step 7: Cache Gradle để tăng tốc build lần sau
      # ----------------------------------------------------------
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ----------------------------------------------------------
      # Step 8: Run Android unit tests
      # (Unit tests — không cần emulator)
      # ----------------------------------------------------------
      - name: Run Android unit tests
        run: |
          cd android
          ./gradlew test --no-daemon

      # ----------------------------------------------------------
      # Step 9: Build debug APK
      # ----------------------------------------------------------
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # ----------------------------------------------------------
      # Step 10: Upload APK artifact
      # ----------------------------------------------------------
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn
