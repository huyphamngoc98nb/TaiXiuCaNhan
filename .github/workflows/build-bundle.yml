# =============================================================
# build-bundle.yml
# CI/CD: Tự động build OTA bundle sau mỗi push vào main
#
# Secret cần cấu hình duy nhất:
#   BUNDLE_SIGNING_KEY — Nội dung private_key.pem (RSA 4096-bit)
#                       Settings → Secrets and variables → Actions
#
# Node.js 22 bắt buộc: @capacitor/cli ^8.x yêu cầu Node >= 22
# Artifacts được publish lên GitHub Releases với tag:
#   bundle-<bundleVersion>  (VD: bundle-0.1.0-b1)
# =============================================================
name: Build OTA Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-bundle-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ============================================================
  # Job 1: Build web bundle → ký số → GitHub Release
  # Yêu cầu secret: BUNDLE_SIGNING_KEY
  # Node 22 bắt buộc: Capacitor CLI v8 yêu cầu Node >= 22
  # ============================================================
  build-and-release:
    name: Build → Sign → GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUNDLE_VERSION: ""
      CHECKSUM: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node 22 LTS — bắt buộc cho @capacitor/cli ^8.x
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write signing key
        env:
          BUNDLE_SIGNING_KEY: ${{ secrets.BUNDLE_SIGNING_KEY }}
        run: |
          printf '%s' "${BUNDLE_SIGNING_KEY}" > private_key.pem
          chmod 600 private_key.pem

      - name: Build OTA bundle
        run: bash scripts/build-bundle.sh

      - name: Read bundle version
        run: |
          BUNDLE_VERSION=$(node -e "
            import fs from 'fs';
            const v = JSON.parse(fs.readFileSync('./version.config.json', 'utf8'));
            process.stdout.write(v.bundleVersion);
          " --input-type=module)
          echo "BUNDLE_VERSION=${BUNDLE_VERSION}" >> "$GITHUB_ENV"
          echo ">> bundleVersion = ${BUNDLE_VERSION}"

      - name: Upload artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: ota-bundle-${{ github.sha }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bundle-${{ env.BUNDLE_VERSION }}
          name: "OTA Bundle ${{ env.BUNDLE_VERSION }}"
          body: |
            ## OTA Bundle `${{ env.BUNDLE_VERSION }}`
            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref_name }}
            **Build time**: ${{ github.event.head_commit.timestamp }}
            ### Artifacts
            | File | Mô tả |
            |------|-------|
            | `${{ env.BUNDLE_VERSION }}.zip` | Web bundle |
            | `${{ env.BUNDLE_VERSION }}.zip.sha256` | SHA-256 checksum |
            | `${{ env.BUNDLE_VERSION }}.zip.sig` | Chữ ký RSA-SHA256 |
            ### Verify chữ ký
            ```bash
            openssl dgst -sha256 -verify public_key.pem \
              -signature ${{ env.BUNDLE_VERSION }}.zip.sig \
              ${{ env.BUNDLE_VERSION }}.zip
            ```
          files: |
            artifacts/${{ env.BUNDLE_VERSION }}.zip
            artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256
            artifacts/${{ env.BUNDLE_VERSION }}.zip.sig
          make_latest: true
          fail_on_unmatched_files: true

      - name: Print download URLs
        run: |
          BASE="https://github.com/huyphamngoc98nb/TaiXiuCaNhan/releases/download/bundle-${{ env.BUNDLE_VERSION }}"
          echo "=== RELEASE URLs ==="
          echo "  url    : ${BASE}/${{ env.BUNDLE_VERSION }}.zip"
          echo "  sigUrl : ${BASE}/${{ env.BUNDLE_VERSION }}.zip.sig"
          echo "  sha256 : $(cat artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256)"

      - name: Read checksum into env
        run: |
          CHECKSUM=$(cat "artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256")
          echo "CHECKSUM=${CHECKSUM}" >> "$GITHUB_ENV"

      - name: Update bundle manifest
        env:
          CDN_BASE_URL: "https://github.com/huyphamngoc98nb/TaiXiuCaNhan/releases/download/bundle-${{ env.BUNDLE_VERSION }}"
        run: |
          node scripts/update-manifest.js \
            --version "${{ env.BUNDLE_VERSION }}" \
            --checksum "${{ env.CHECKSUM }}"

      - name: Commit and push bundle manifest
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add server/data/bundle-manifest.json
          if git diff --cached --quiet; then
            echo ">> Không có thay đổi, bỏ qua commit."
          else
            git commit -m "ci: update bundle manifest to ${{ env.BUNDLE_VERSION }}"
            git push
          fi

      - name: Cleanup signing key
        if: always()
        run: rm -f private_key.pem

  # ============================================================
  # Job 2: Android build + unit test dưới JDK 17
  # Không cần BUNDLE_SIGNING_KEY
  #
  # Node 22 bắt buộc: `npx cap sync android` dùng Capacitor CLI v8
  #   @capacitor/cli ^8.3.1 yêu cầu Node >= 22
  #   Dùng Node 20 → [fatal] The Capacitor CLI requires NodeJS >=22.0.0
  #
  # Tại sao cần `npx cap sync android`:
  #   Capacitor generate các module local khi sync:
  #     - android/capacitor-android/                   (:capacitor-android)
  #     - android/capacitor-cordova-android-plugins/   (:capacitor-cordova-android-plugins)
  #     - android/app/src/main/assets/public/          (web assets)
  #   Nếu không sync → Gradle: "Project ':capacitor-android' not found"
  #
  # flatDir WARNING là bình thường — do Capacitor tự thêm, không sửa.
  # ============================================================
  android-build:
    name: Android → JDK 17 → Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Bắt buộc: AGP yêu cầu Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Node 22 LTS — bắt buộc cho @capacitor/cli ^8.x (cap sync)
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Bước 1: cài npm trước — cap sync cần node_modules
      - name: Install npm dependencies
        run: npm ci

      # --------------------------------------------------------
      # Bước 2: Capacitor sync — QUAN TRỌNG
      # Generate android/capacitor-android/ và
      # android/capacitor-cordova-android-plugins/
      # Cần Node 22: Capacitor CLI v8 yêu cầu Node >= 22
      # --------------------------------------------------------
      - name: Capacitor sync Android
        run: npx cap sync android

      # --------------------------------------------------------
      # Bước 3: chmod +x trước bất kỳ lệnh ./gradlew nào
      # Linux runner không giữ execute bit từ git → exit code 126
      # --------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Cache sau chmod, trước khi Gradle chạy lần đầu
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Verify: phải ra openjdk 17 và Gradle 8.10.2, JVM: 17.x
      - name: Verify Java & Gradle versions
        run: |
          echo "=== Java version ==="
          java -version
          echo ""
          echo "=== Gradle version ==="
          cd android && ./gradlew -version

      # Clean — loại bỏ stale artifacts giữa các run
      - name: Clean Gradle build
        run: cd android && ./gradlew clean --no-daemon

      # --stacktrace --info để lấy full error output khi có lỗi
      - name: Run Android unit tests
        run: cd android && ./gradlew test --no-daemon --stacktrace --info

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      # Upload build reports khi fail — để debug lỗi dễ hơn
      - name: Upload Gradle build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports-${{ github.sha }}
          path: |
            android/app/build/reports/
            android/**/build/reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn
