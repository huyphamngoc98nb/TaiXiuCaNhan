# =============================================================
# build-bundle.yml
# CI/CD: Tự động build OTA bundle sau mỗi push vào main
#
# Secret cần cấu hình duy nhất:
#   BUNDLE_SIGNING_KEY — Nội dung private_key.pem (RSA 4096-bit)
#                       Settings → Secrets and variables → Actions
#
# Artifacts được publish lên GitHub Releases với tag:
#   bundle-<bundleVersion>  (VD: bundle-0.1.0-b1)
# Public download URL (dùng trong bundle-manifest.json):
#   https://github.com/<owner>/<repo>/releases/download/bundle-<ver>/<ver>.zip
# =============================================================
name: Build OTA Bundle

on:
  push:
    branches:
      - main
  # Chạy thủ công từ GitHub UI nếu cần
  workflow_dispatch:

# Chỉ cho phép 1 workflow chạy cùng lúc trên main
# Workflow cũ hơn sẽ bị hủy thay vì chờ
concurrency:
  group: build-bundle-${{ github.ref }}
  cancel-in-progress: true

# Cấp quyền tối thiểu cho GITHUB_TOKEN
# contents: write — cần để tạo Release, upload artifact và push manifest
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build → Sign → GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUNDLE_VERSION: ""
      CHECKSUM: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write signing key
        env:
          BUNDLE_SIGNING_KEY: ${{ secrets.BUNDLE_SIGNING_KEY }}
        run: |
          printf '%s' "${BUNDLE_SIGNING_KEY}" > private_key.pem
          chmod 600 private_key.pem

      - name: Build OTA bundle
        run: bash scripts/build-bundle.sh

      - name: Read bundle version
        run: |
          BUNDLE_VERSION=$(node -e "
            import fs from 'fs';
            const v = JSON.parse(fs.readFileSync('./version.config.json', 'utf8'));
            process.stdout.write(v.bundleVersion);
          " --input-type=module)
          echo "BUNDLE_VERSION=${BUNDLE_VERSION}" >> "$GITHUB_ENV"
          echo ">> bundleVersion = ${BUNDLE_VERSION}"

      - name: Upload artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: ota-bundle-${{ github.sha }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bundle-${{ env.BUNDLE_VERSION }}
          name: "OTA Bundle ${{ env.BUNDLE_VERSION }}"
          body: |
            ## OTA Bundle `${{ env.BUNDLE_VERSION }}`
            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref_name }}
            **Build time**: ${{ github.event.head_commit.timestamp }}
            ### Artifacts
            | File | Mô tả |
            |------|-------|
            | `${{ env.BUNDLE_VERSION }}.zip` | Web bundle (giải nén vào app) |
            | `${{ env.BUNDLE_VERSION }}.zip.sha256` | SHA-256 checksum |
            | `${{ env.BUNDLE_VERSION }}.zip.sig` | Chữ ký RSA-SHA256 |
            ### Verify chữ ký
            ```bash
            openssl dgst -sha256 -verify public_key.pem \
              -signature ${{ env.BUNDLE_VERSION }}.zip.sig \
              ${{ env.BUNDLE_VERSION }}.zip
            ```
          files: |
            artifacts/${{ env.BUNDLE_VERSION }}.zip
            artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256
            artifacts/${{ env.BUNDLE_VERSION }}.zip.sig
          make_latest: true
          fail_on_unmatched_files: true

      - name: Print download URLs
        run: |
          BASE="https://github.com/huyphamngoc98nb/TaiXiuCaNhan/releases/download/bundle-${{ env.BUNDLE_VERSION }}"
          echo "============================================================"
          echo " RELEASE URLs (dùng trong bundle-manifest.json)"
          echo "============================================================"
          echo "  url    : ${BASE}/${{ env.BUNDLE_VERSION }}.zip"
          echo "  sigUrl : ${BASE}/${{ env.BUNDLE_VERSION }}.zip.sig"
          echo "  sha256 : $(cat artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256)"
          echo "============================================================"

      - name: Read checksum into env
        run: |
          CHECKSUM=$(cat "artifacts/${{ env.BUNDLE_VERSION }}.zip.sha256")
          echo "CHECKSUM=${CHECKSUM}" >> "$GITHUB_ENV"

      - name: Update bundle manifest
        env:
          CDN_BASE_URL: "https://github.com/huyphamngoc98nb/TaiXiuCaNhan/releases/download/bundle-${{ env.BUNDLE_VERSION }}"
        run: |
          node scripts/update-manifest.js \
            --version "${{ env.BUNDLE_VERSION }}" \
            --checksum "${{ env.CHECKSUM }}"

      - name: Commit and push bundle manifest
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add server/data/bundle-manifest.json
          if git diff --cached --quiet; then
            echo ">> bundle-manifest.json không thay đổi, bỏ qua commit."
          else
            git commit -m "ci: update bundle manifest to ${{ env.BUNDLE_VERSION }}"
            git push
          fi

      - name: Cleanup signing key
        if: always()
        run: rm -f private_key.pem

  # ============================================================
  # Job Android: Build + Unit test dưới JDK 17
  # Gradle 8.10.2 tương thích JDK 17 ✅
  # build.gradle khai báo JavaVersion.VERSION_17 ✅
  # ============================================================
  android-build:
    name: Android → JDK 17 → Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # JDK 17 bắt buộc — Android Gradle Plugin yêu cầu Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # --------------------------------------------------------
      # QUAN TRỌNG: chmod +x phải đứng TRƯỜC mọi lệnh ./gradlew
      # Linux runner không giữ file permission từ git checkout
      # Nếu để sau sẽ gây: Permission denied (exit code 126)
      # --------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Cache Gradle — đặt sau chmod, trước khi Gradle chạy lần đầu
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Verify sau chmod — lúc này ./gradlew mới có quyền chạy
      - name: Verify Java & Gradle versions
        run: |
          echo "=== Java version ==="
          java -version
          echo ""
          echo "=== Gradle version ==="
          cd android && ./gradlew -version

      - name: Run Android unit tests
        run: cd android && ./gradlew test --no-daemon

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn
