# =============================================================
# build-bundle.yml
# CI/CD: Tự động build OTA bundle sau mỗi push vào main
#
# Secrets cần cấu hình trước khi dùng:
#   BUNDLE_SIGNING_KEY    — Nội dung private_key.pem (RSA 4096-bit)
#   R2_ACCOUNT_ID         — Cloudflare Account ID
#   R2_ACCESS_KEY_ID      — R2 Access Key (tạo trong CF Dashboard)
#   R2_SECRET_ACCESS_KEY  — R2 Secret Key
#   R2_BUCKET_NAME        — Tên R2 bucket (VD: ota-bundles)
#   R2_PUBLIC_URL         — Base URL public bucket (VD: https://cdn.example.com)
# =============================================================
name: Build OTA Bundle

on:
  push:
    branches:
      - main
  # Chạy thủ công từ GitHub UI nếu cần
  workflow_dispatch:

# Chỉ cho phép 1 workflow chạy cùng lúc trên main
# Workflow cũ hơn sẽ bị hủy thay vì chờ
concurrency:
  group: build-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build → Sign → Upload OTA Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ----------------------------------------------------------
      # Step 1: Checkout code
      # ----------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Step 2: Setup Node.js 20 với npm cache
      # ----------------------------------------------------------
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ----------------------------------------------------------
      # Step 3: Cài đặt dependencies (ci = clean install, không sửa lock)
      # ----------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ----------------------------------------------------------
      # Step 4: Ghi BUNDLE_SIGNING_KEY ra private_key.pem
      # Dùng printf thay echo để tránh platform-specific newline issues
      # ----------------------------------------------------------
      - name: Write signing key
        env:
          BUNDLE_SIGNING_KEY: ${{ secrets.BUNDLE_SIGNING_KEY }}
        run: |
          printf '%s' "${BUNDLE_SIGNING_KEY}" > private_key.pem
          chmod 600 private_key.pem

      # ----------------------------------------------------------
      # Step 5: Build bundle (vite build → zip → sha256 → sign)
      # ----------------------------------------------------------
      - name: Build OTA bundle
        run: bash scripts/build-bundle.sh

      # ----------------------------------------------------------
      # Step 6: Đọc bundleVersion vào env để dùng ở các step sau
      # ----------------------------------------------------------
      - name: Set BUNDLE_VERSION env
        run: |
          BUNDLE_VERSION=$(node -e "
            const v = require('./version.config.json');
            process.stdout.write(v.bundleVersion);
          ")
          echo "BUNDLE_VERSION=${BUNDLE_VERSION}" >> $GITHUB_ENV
          echo ">> bundleVersion = ${BUNDLE_VERSION}"

      # ----------------------------------------------------------
      # Step 7: Upload artifacts lên GitHub Actions Artifacts
      # Giữ lại 7 ngày (giảm storage, đủ để debug)
      # ----------------------------------------------------------
      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ota-bundle-${{ github.sha }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

      # ----------------------------------------------------------
      # Step 8: Upload lên Cloudflare R2
      # R2 tương thích S3 API — dùng awscli với custom endpoint
      # Endpoint format: https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      # Egress (download) miễn phí — không tốn phí khi app tải bundle
      # ----------------------------------------------------------
      - name: Upload artifacts to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Upload 3 artifacts lên thư mục bundles/ trong R2 bucket
          aws s3 cp artifacts/ "s3://${R2_BUCKET_NAME}/bundles/" \
            --recursive \
            --no-progress \
            --endpoint-url "${R2_ENDPOINT}"

          # In public URL của từng artifact để trace
          echo ">> Artifacts available at:"
          echo "   ${R2_PUBLIC_URL}/bundles/${{ env.BUNDLE_VERSION }}.zip"
          echo "   ${R2_PUBLIC_URL}/bundles/${{ env.BUNDLE_VERSION }}.zip.sha256"
          echo "   ${R2_PUBLIC_URL}/bundles/${{ env.BUNDLE_VERSION }}.zip.sig"

      # ----------------------------------------------------------
      # Step 9: Xóa private key — luôn chạy kể cả khi các step trước fail
      # ----------------------------------------------------------
      - name: Cleanup signing key
        if: always()
        run: |
          rm -f private_key.pem
          echo ">> private_key.pem đã được xóa"
