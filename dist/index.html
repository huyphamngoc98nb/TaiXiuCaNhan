<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f7fa" />
    <script>
      (function () {
        var preference = 'system';
        try {
          var stored = window.localStorage.getItem('themePreference');
          if (stored === 'light' || stored === 'dark' || stored === 'system') {
            preference = stored;
          }
        } catch (error) {
          preference = 'system';
        }

        var prefersDark = false;
        try {
          prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        } catch (error) {
          prefersDark = false;
        }

        var resolved = preference === 'system' ? (prefersDark ? 'dark' : 'light') : preference;
        var root = document.documentElement;
        root.classList.toggle('dark', resolved === 'dark');
        root.dataset.theme = resolved;
        root.style.colorScheme = resolved;

        var themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute('content', resolved === 'dark' ? '#111114' : '#f5f7fa');
        }
      })();
    </script>
    <title>Expense Tracker</title>
    <script type="module" crossorigin src="/assets/index-CrIJOzUs.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CVFP7jKX.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
