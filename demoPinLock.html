<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mở khóa dữ liệu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Hanken+Grotesk:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pin-dot-shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(9px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(4px); }
        }
        .key-tap-effect:active {
            background-color: #eef2f7;
            transform: scale(0.92);
        }
        .pin-dot-fill {
            transform: scale(0);
            opacity: 0;
        }
        .pin-dot[data-filled="true"] .pin-dot-fill {
            transform: scale(1);
            opacity: 1;
        }
        .pin-dot-row[data-shaking="true"] {
            animation: pin-dot-shake 220ms ease-in-out;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#4A6FA5",
                        "inverse-primary": "#bbc3ff",
                        "surface-container-high": "#e9e7f1",
                        "background": "#F5F5F7",
                        "tertiary-container": "#ad6200",
                        "on-secondary-fixed-variant": "#44474c",
                        "primary-fixed-dim": "#bbc3ff",
                        "on-surface": "#1a1b22",
                        "on-secondary-fixed": "#181c21",
                        "surface": "#fbf8ff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#576add",
                        "on-primary-fixed-variant": "#2439ac",
                        "on-tertiary-fixed": "#2e1600",
                        "tertiary-fixed-dim": "#ffb877",
                        "outline-variant": "#c5c5d5",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2f3037",
                        "error-container": "#ffdad6",
                        "tertiary": "#8a4d00",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#000f5d",
                        "on-tertiary-fixed-variant": "#6c3b00",
                        "tertiary-fixed": "#ffdcc0",
                        "secondary-container": "#e0e2e9",
                        "surface-bright": "#fbf8ff",
                        "surface-container": "#efedf7",
                        "inverse-on-surface": "#f1effa",
                        "on-tertiary-container": "#fffbff",
                        "surface-dim": "#dad9e3",
                        "secondary-fixed": "#e0e2e9",
                        "surface-container-low": "#f4f2fd",
                        "error": "#ba1a1a",
                        "on-background": "#1a1b22",
                        "on-secondary-container": "#61646a",
                        "outline": "#757685",
                        "on-surface-variant": "#454653",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-tint": "#3f53c5",
                        "secondary-fixed-dim": "#c4c6cd",
                        "on-primary-container": "#fffbff",
                        "secondary": "#5b5e64",
                        "surface-container-highest": "#e3e1eb",
                        "surface-variant": "#e3e1eb",
                        "primary-fixed": "#dee0ff",
                        "on-secondary": "#ffffff",
                        "key-accent": "#4A6FA5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "keypad-gap": "12px",
                        "stack-spacing-lg": "32px",
                        "stack-spacing-sm": "8px",
                        "stack-spacing-md": "16px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "body-muted": ["Hanken Grotesk"],
                        "headline-title": ["Plus Jakarta Sans"],
                        "numeral-display": ["Hanken Grotesk"],
                        "button-label": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-muted": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-title": ["24px", {"lineHeight": "30px", "fontWeight": "800"}],
                        "numeral-display": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "button-label": ["16px", {"lineHeight": "24px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-muted overflow-hidden">
<!-- Android Status Bar -->
<div class="w-full h-8 flex items-center justify-between px-6 py-2 z-50">
<div class="text-xs font-semibold text-on-surface">12:45</div>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-[16px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</div>
<main class="flex flex-1 items-center justify-center px-6 pb-6 pt-2">
<section class="w-full max-w-[390px]">
<div class="flex flex-col items-center text-center">
<div class="mb-6 flex h-14 w-14 items-center justify-center rounded-full bg-white shadow-[0_10px_30px_rgba(17,24,39,0.08)]">
<span class="material-symbols-outlined text-primary text-[30px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="font-headline-title text-headline-title text-on-surface">Mở khóa dữ liệu</h1>
<p class="mt-2 max-w-[260px] font-body-muted text-body-muted text-on-surface-variant">Nhập mã PIN để tiếp tục.</p>
</div>
<div class="mt-9 flex min-h-[76px] flex-col items-center justify-center">
<div class="pin-dot-row flex h-10 items-center justify-center gap-4" id="pinDots" aria-hidden="true">
<span class="pin-dot flex h-5 w-5 items-center justify-center rounded-full bg-[#D9DEE7]" data-filled="false"><span class="pin-dot-fill h-4 w-4 rounded-full bg-key-accent transition-all duration-200 ease-out"></span></span>
<span class="pin-dot flex h-5 w-5 items-center justify-center rounded-full bg-[#D9DEE7]" data-filled="false"><span class="pin-dot-fill h-4 w-4 rounded-full bg-key-accent transition-all duration-200 ease-out"></span></span>
<span class="pin-dot flex h-5 w-5 items-center justify-center rounded-full bg-[#D9DEE7]" data-filled="false"><span class="pin-dot-fill h-4 w-4 rounded-full bg-key-accent transition-all duration-200 ease-out"></span></span>
<span class="pin-dot flex h-5 w-5 items-center justify-center rounded-full bg-[#D9DEE7]" data-filled="false"><span class="pin-dot-fill h-4 w-4 rounded-full bg-key-accent transition-all duration-200 ease-out"></span></span>
<span class="pin-dot flex h-5 w-5 items-center justify-center rounded-full bg-[#D9DEE7]" data-filled="false"><span class="pin-dot-fill h-4 w-4 rounded-full bg-key-accent transition-all duration-200 ease-out"></span></span>
<span class="pin-dot flex h-5 w-5 items-center justify-center rounded-full bg-[#D9DEE7]" data-filled="false"><span class="pin-dot-fill h-4 w-4 rounded-full bg-key-accent transition-all duration-200 ease-out"></span></span>
</div>
<p class="mt-2 min-h-5 text-center text-[13px] font-medium text-error opacity-0 transition-opacity duration-150" id="pinError" role="alert">Mã PIN không đúng. Thử lại.</p>
</div>
<div class="mt-8 grid grid-cols-3 gap-3">
<button aria-label="Nhập số 1" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="1" type="button">1</button>
<button aria-label="Nhập số 2" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="2" type="button">2</button>
<button aria-label="Nhập số 3" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="3" type="button">3</button>
<button aria-label="Nhập số 4" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="4" type="button">4</button>
<button aria-label="Nhập số 5" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="5" type="button">5</button>
<button aria-label="Nhập số 6" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="6" type="button">6</button>
<button aria-label="Nhập số 7" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="7" type="button">7</button>
<button aria-label="Nhập số 8" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="8" type="button">8</button>
<button aria-label="Nhập số 9" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="9" type="button">9</button>
<div aria-hidden="true"></div>
<button aria-label="Nhập số 0" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-[26px] font-semibold text-on-surface shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100" data-key="0" type="button">0</button>
<button aria-label="Xóa" class="key-tap-effect flex aspect-square items-center justify-center rounded-2xl bg-white text-on-surface-variant shadow-[0_8px_24px_rgba(17,24,39,0.08)] transition duration-100 disabled:opacity-40" data-action="delete" disabled type="button">
<span class="material-symbols-outlined text-[26px]" data-icon="backspace">backspace</span>
</button>
</div>
<button aria-label="Dùng sinh trắc học" class="key-tap-effect mx-auto mt-7 flex h-11 items-center justify-center gap-2 rounded-2xl px-4 text-[14px] font-semibold text-primary transition duration-100" data-action="biometric" type="button">
<span class="material-symbols-outlined text-[21px]" data-icon="fingerprint">fingerprint</span>
<span>Dùng sinh trắc học</span>
</button>
</section>
</main>
<!-- Bottom System Indicator -->
<div class="w-full flex justify-center py-4">
<div class="w-24 h-1 rounded-full bg-outline-variant opacity-50"></div>
</div>
<script>
        const pinLength = 6;
        let pin = '';
        const dotRow = document.getElementById('pinDots');
        const dots = Array.from(document.querySelectorAll('.pin-dot'));
        const error = document.getElementById('pinError');
        const deleteButton = document.querySelector('[data-action="delete"]');

        function renderPin() {
            dots.forEach((dot, index) => {
                dot.dataset.filled = String(index < pin.length);
            });
            deleteButton.disabled = pin.length === 0;
            if (pin.length > 0) error.classList.add('opacity-0');
        }

        function showError() {
            pin = '';
            renderPin();
            error.classList.remove('opacity-0');
            dotRow.dataset.shaking = 'true';
            window.setTimeout(() => {
                dotRow.dataset.shaking = 'false';
            }, 240);
            window.setTimeout(() => {
                error.classList.add('opacity-0');
            }, 2000);
        }

        document.querySelectorAll('[data-key]').forEach(button => {
            button.addEventListener('click', () => {
                if (pin.length >= pinLength) return;
                pin += button.dataset.key;
                renderPin();
                if (pin.length === pinLength) {
                    window.setTimeout(showError, 220);
                }
            });
        });

        deleteButton.addEventListener('click', () => {
            pin = pin.slice(0, -1);
            renderPin();
        });

        document.querySelector('[data-action="biometric"]').addEventListener('click', () => {
            error.textContent = 'Sinh trắc học chưa được bật.';
            error.classList.remove('opacity-0');
            window.setTimeout(() => {
                error.textContent = 'Mã PIN không đúng. Thử lại.';
                error.classList.add('opacity-0');
            }, 2000);
        });
    </script>
</body></html>
